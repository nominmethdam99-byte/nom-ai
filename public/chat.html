<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra AI v8.0 - By Nomin Methdam</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1a1a1a;
      --accent: #6366f1;
      --accent2: #818cf8;
      --text: #e5e5e5;
      --dim: #666;
      --gold: #f59e0b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
    
    .sidebar{width:260px;background:var(--surface);padding:16px;border-right:1px solid var(--border);display:flex;flex-direction:column}
    .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6366f1,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
    .version{font-size:10px;color:var(--gold);margin-bottom:2px;font-weight:600}
    .creator{font-size:11px;color:var(--dim);margin-bottom:20px}
    .creator span{color:var(--accent2)}
    
    .mode-btns{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .mode-btn{background:transparent;border:1px solid #222;color:var(--dim);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;text-align:left;transition:all .2s}
    .mode-btn:hover{border-color:var(--accent);color:#fff}
    .mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    
    .btn-new{background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;margin-bottom:8px}
    .btn-out{background:transparent;border:1px solid #333;color:var(--dim);padding:8px;border-radius:6px;cursor:pointer;margin-top:auto;font-size:12px}
    
    .main{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%}
    .header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .header-text{font-size:12px;color:var(--dim)}
    
    .chat{flex:1;overflow-y:auto;padding:20px}
    .msg{margin-bottom:24px;animation:slide .2s ease}
    @keyframes slide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{display:flex;justify-content:flex-end}
    .msg.user div{background:#1e1e1e;padding:10px 16px;border-radius:14px 14px 4px 14px;max-width:75%;font-size:14px;line-height:1.5;border:1px solid #2a2a2a}
    .msg.ai div{padding:10px 0;font-size:14px;line-height:1.7}
    .msg.ai pre{background:#0d0d0d;padding:14px;border-radius:8px;overflow-x:auto;margin:10px 0;border:1px solid #1a1a1a;font-size:13px}
    .msg.ai code{font-family:'Fira Code',monospace;font-size:13px}
    
    .input-area{padding:16px 20px;border-top:1px solid var(--border)}
    .input-wrap{display:flex;gap:8px;background:#111;border:1px solid #222;border-radius:12px;padding:6px 6px 6px 16px;transition:border .2s}
    .input-wrap:focus-within{border-color:var(--accent)}
    #msgInput{flex:1;background:transparent;border:none;color:#fff;font-size:14px;outline:none;resize:none;padding:8px 0;max-height:150px}
    #msgInput::placeholder{color:#444}
    #sendBtn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap}
    #sendBtn:disabled{opacity:.5}
    .thinking{color:var(--dim)}
    
    .model-badge{font-size:10px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);padding:2px 8px;border-radius:4px;color:var(--accent2);margin-left:8px}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">ULTRA AI</div>
    <div class="version">▸ v8.0</div>
    <div class="creator">by <span>Nomin Methdam</span></div>
    
    <div class="mode-btns">
      <button class="mode-btn active" onclick="setMode('default',this)">🧠 General</button>
      <button class="mode-btn" onclick="setMode('coder',this)">💻 Code</button>
      <button class="mode-btn" onclick="setMode('hacker',this)">🛡️ Security</button>
      <button class="mode-btn" onclick="setMode('creative',this)">✨ Creative</button>
      <button class="mode-btn" onclick="setMode('teacher',this)">📚 Teacher</button>
    </div>
    
    <button class="btn-new" onclick="newChat()">+ New Chat</button>
    <button class="btn-out" onclick="location.href='/logout'">Logout</button>
  </div>
  
  <div class="main">
    <div class="header">
      <div class="dot"></div>
      <span class="header-text">Ultra AI v8.0 Online</span>
      <span class="model-badge" id="modeBadge">General</span>
    </div>
    
    <div class="chat" id="chatBox">
      <div class="msg ai">
        <div>
          🧠 <b>Ultra AI v8.0</b> — The most advanced AI<br>
          Created by <b>Nomin Methdam</b><br>
          <br>
          ⚡ Modes: General | Code | Security | Creative | Teacher<br>
          🎯 Never wrong. Always perfect.<br>
          <br>
          <i>Ask me anything...</i>
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Message Ultra AI v8.0..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button id="sendBtn" onclick="send()">➤</button>
      </div>
    </div>
  </div>

  <script>
    let convId = 'u' + Date.now();
    let currentMode = 'default';
    
    function setMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('modeBadge').textContent = btn.textContent.trim();
    }
    
    function newChat() {
      convId = 'u' + Date.now();
      document.getElementById('chatBox').innerHTML = '<div class="msg ai"><div>✨ New chat started. Mode: <b>' + currentMode + '</b></div></div>';
    }
    
    async function send() {
      const input = document.getElementById('msgInput');
      const btn = document.getElementById('sendBtn');
      const msg = input.value.trim();
      if (!msg) return;
      
      const chat = document.getElementById('chatBox');
      chat.innerHTML += '<div class="msg user"><div>' + msg.replace(/</g,'&lt;') + '</div></div>';
      chat.innerHTML += '<div class="msg ai"><div class="thinking">Ultra AI thinking...</div></div>';
      input.value = '';
      btn.disabled = true;
      chat.scrollTop = chat.scrollHeight;
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: msg, mode: currentMode, conversationId: convId})
        });
        const data = await res.json();
        
        const lastMsg = chat.querySelector('.msg.ai:last-child div');
        lastMsg.innerHTML = (data.reply || 'No response')
          .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
          .replace(/\n/g, '<br>')
          .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        lastMsg.className = '';
      } catch(e) {
        chat.querySelector('.msg.ai:last-child div').innerHTML = '❌ Connection error. Try again.';
      }
      
      btn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
