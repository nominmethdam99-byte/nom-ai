<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepNom AI - Fast Chat</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --sidebar: #141414;
      --chat-bg: #1a1a1a;
      --user-msg: #2b2b2b;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --text: #e5e5e5;
      --text-dim: #888;
      --border: #222;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    
    .logo span {
      background: linear-gradient(135deg, #4f46e5, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    
    .new-chat {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    
    .new-chat:hover { background: var(--accent-hover); }
    
    .conv-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .conv-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .conv-item:hover { background: #222; color: #fff; }
    
    .logout-btn {
      background: transparent;
      border: 1px solid #333;
      color: var(--text-dim);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: auto;
    }
    
    .logout-btn:hover { border-color: #555; color: #fff; }
    
    /* Main Chat */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .msg {
      margin-bottom: 24px;
      animation: fadeIn 0.2s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .msg.user {
      display: flex;
      justify-content: flex-end;
    }
    
    .msg.user .bubble {
      background: #2b2b2b;
      padding: 10px 16px;
      border-radius: 12px 12px 4px 12px;
      max-width: 80%;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .msg.ai .bubble {
      padding: 10px 0;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .msg.ai pre {
      background: #111;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
      border: 1px solid #222;
    }
    
    .msg.ai code {
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    
    /* Input */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    
    .input-wrap {
      display: flex;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.2s;
    }
    
    .input-wrap:focus-within {
      border-color: var(--accent);
    }
    
    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      outline: none;
      resize: none;
      padding: 8px 0;
      max-height: 120px;
    }
    
    #msgInput::placeholder { color: #555; }
    
    #sendBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    
    #sendBtn:hover { background: var(--accent-hover); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .stop-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: none;
    }
    
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    
    .typing-indicator span {
      width: 5px;
      height: 5px;
      background: #666;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }
    
    .error-msg {
      color: #ef4444;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo"><span>DeepNom</span> AI</div>
    <div class="subtitle">Created by Nomin Methdam</div>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div class="conv-list" id="convList"></div>
    <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
  </div>
  
  <!-- Main -->
  <div class="main">
    <div class="chat-area" id="chatArea">
      <div class="msg ai">
        <div class="bubble">
          👋 <strong>Welcome to DeepNom AI!</strong><br>
          Ultra-fast AI chat by <strong>Nomin Methdam</strong>.<br>
          Ask anything — responses stream instantly.
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Send a message..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="sendMsg()">Send</button>
        <button class="stop-btn" id="stopBtn" onclick="stopStream()">⏹ Stop</button>
      </div>
    </div>
  </div>

  <script>
    let convId = 'chat_' + Date.now();
    let abortController = null;
    
    function newChat() {
      convId = 'chat_' + Date.now();
      document.getElementById('chatArea').innerHTML = '<div class="msg ai"><div class="bubble">✨ New chat started.</div></div>';
    }
    
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    }
    
    function stopStream() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('sendBtn').style.display = 'inline-block';
    }
    
    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (!msg) return;
      
      const chatArea = document.getElementById('chatArea');
      
      // Add user message
      chatArea.innerHTML += `<div class="msg user"><div class="bubble">${escapeHtml(msg)}</div></div>`;
      
      // Add AI message placeholder
      const aiMsgId = 'ai-' + Date.now();
      chatArea.innerHTML += `<div class="msg ai"><div class="bubble" id="${aiMsgId}"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
      
      input.value = '';
      document.getElementById('sendBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-block';
      chatArea.scrollTop = chatArea.scrollHeight;
      
      // Create abort controller
      abortController = new AbortController();
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, conversationId: convId }),
          signal: abortController.signal
        });
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        const bubble = document.getElementById(aiMsgId);
        bubble.innerHTML = '';
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const text = decoder.decode(value, { stream: true });
          bubble.innerHTML += text
            .replace(/```(\w+)?\n?/g, '<pre><code>')
            .replace(/```/g, '</code></pre>')
            .replace(/\n/g, '<br>');
          
          chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        // Clean up open code blocks
        if (bubble.innerHTML.includes('<pre><code>') && !bubble.innerHTML.includes('</code></pre>')) {
          bubble.innerHTML += '</code></pre>';
        }
        
      } catch(e) {
        if (e.name !== 'AbortError') {
          document.getElementById(aiMsgId).innerHTML = '<span class="error-msg">❌ Connection error. Try again.</span>';
        }
      }
      
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('sendBtn').style.display = 'inline-block';
      abortController = null;
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
