<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nom AI - Chat</title>
  <style>
    :root{--bg:#06060e;--surface:#0e0e1a;--surface2:#161628;--accent:#6c5ce7;--accent2:#a855f7;--text:#e8e8f0;--text2:#808098}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
    .sidebar{width:260px;background:var(--surface);padding:20px;border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column}
    .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6c5ce7,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .creator{font-size:11px;color:var(--text2);margin:4px 0 20px}
    .creator span{color:var(--accent2);font-weight:600}
    .btn-new{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;border:none;padding:10px;border-radius:10px;cursor:pointer;font-weight:600;margin-bottom:16px}
    .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--text2);padding:10px;border-radius:10px;cursor:pointer;margin-top:auto}
    .main{flex:1;display:flex;flex-direction:column}
    .chat-area{flex:1;overflow-y:auto;padding:24px;max-width:800px;margin:0 auto;width:100%}
    .msg{margin-bottom:20px;animation:slideIn .3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{display:flex;justify-content:flex-end}
    .msg.user .bubble{background:var(--surface2);padding:12px 18px;border-radius:16px 16px 4px 16px;max-width:70%;border:1px solid rgba(255,255,255,.08)}
    .msg.ai .bubble{padding:14px 0;line-height:1.7}
    .msg.ai pre{background:var(--surface);padding:14px;border-radius:8px;overflow-x:auto}
    .input-area{padding:20px;border-top:1px solid rgba(255,255,255,.05);max-width:800px;margin:0 auto;width:100%}
    .input-wrap{display:flex;gap:10px;background:var(--surface2);border-radius:14px;padding:6px 6px 6px 16px;border:1px solid rgba(255,255,255,.08)}
    .input-wrap:focus-within{border-color:var(--accent)}
    #msgInput{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;outline:none;resize:none;padding:10px 0}
    #msgInput::placeholder{color:var(--text2)}
    .btn-icon{background:transparent;border:none;color:var(--text2);cursor:pointer;padding:8px 12px;border-radius:8px;font-size:18px}
    .btn-icon:hover{background:rgba(255,255,255,.05)}
    #sendBtn{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600}
    .typing{color:var(--text2)}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">🧠 Nom AI</div>
    <div class="creator">by <span>Nomin Methdam</span></div>
    <button class="btn-new" onclick="newChat()">✨ New Chat</button>
    <button class="btn-logout" onclick="location.href='/logout'">🚪 Logout</button>
  </div>
  <div class="main">
    <div class="chat-area" id="chat">
      <div class="msg ai">
        <div class="bubble">
          <strong>Welcome to Nom AI!</strong> 👋<br><br>
          I am the most perfect AI ever created by <strong>Nomin Methdam</strong>.<br>
          Ask me anything — I never make mistakes.
        </div>
      </div>
    </div>
    <div class="input-area">
      <div id="filePreview"></div>
      <div class="input-wrap">
        <input type="file" id="fileInput" style="display:none" onchange="handleFile(event)">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">📎</button>
        <textarea id="msgInput" rows="1" placeholder="Ask Nom AI anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button id="sendBtn" onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>
  <script>
    let convId='chat_'+Date.now();
    let fileContent=null;
    function newChat(){convId='chat_'+Date.now();document.getElementById('chat').innerHTML='<div class="msg ai"><div class="bubble">✨ New chat started.</div></div>';document.getElementById('filePreview').innerHTML='';fileContent=null}
    async function handleFile(e){const file=e.target.files[0];if(!file)return;const fd=new FormData();fd.append('file',file);document.getElementById('filePreview').innerHTML='<div style="font-size:12px;color:var(--accent2);margin-bottom:8px;">Reading...</div>';const res=await fetch('/api/upload',{method:'POST',body:fd});const data=await res.json();fileContent=data.content;document.getElementById('filePreview').innerHTML='<div style="background:rgba(108,92,231,.1);padding:6px 12px;border-radius:6px;font-size:12px;margin-bottom:8px;">📄 '+data.filename+' <button onclick="fileContent=null;document.getElementById(\'filePreview\').innerHTML=\'\'" style="background:none;border:none;color:red;cursor:pointer;">✕</button></div>'}
    async function sendMsg(){const input=document.getElementById('msgInput');const msg=input.value.trim();if(!msg)return;const chat=document.getElementById('chat');chat.innerHTML+='<div class="msg user"><div class="bubble">'+msg+'</div></div>';chat.innerHTML+='<div class="msg ai"><div class="bubble typing">Thinking...</div></div>';input.value='';chat.scrollTop=chat.scrollHeight;try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,conversationId:convId,fileContext:fileContent})});const data=await res.json();if(data.error){chat.lastElementChild.querySelector('.bubble').innerHTML='❌ '+data.error}else{chat.lastElementChild.querySelector('.bubble').innerHTML=data.reply.replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}fileContent=null;document.getElementById('filePreview').innerHTML='';chat.scrollTop=chat.scrollHeight}catch(e){chat.lastElementChild.querySelector('.bubble').innerHTML='❌ Connection error'}}
  </script>
</body>
</html>
