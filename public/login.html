<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nom AI - Login</title>
  <style>
    :root{--bg:#06060e;--accent:#6c5ce7;--accent2:#a855f7;--text:#e8e8f0;--text2:#808098}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0}
    .particle{position:absolute;border-radius:50%;animation:float 6s infinite ease-in-out}
    @keyframes float{0%,100%{transform:translateY(0)translateX(0)scale(1);opacity:.3}50%{transform:translateY(-120px)translateX(60px)scale(1.5);opacity:.6}}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orb 10s infinite ease-in-out}
    @keyframes orb{0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(80px,-80px)scale(1.3)}}
    .login-box{position:relative;z-index:1;background:rgba(15,15,35,.85);backdrop-filter:blur(30px);border:1px solid rgba(108,92,231,.2);border-radius:24px;padding:48px;width:400px;box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 100px rgba(108,92,231,.1);animation:glow 3s infinite}
    @keyframes glow{0%,100%{box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 100px rgba(108,92,231,.1)}50%{box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 150px rgba(108,92,231,.2)}}
    .logo{text-align:center;margin-bottom:30px}
    .logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#6c5ce7,#a855f7);border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 2s infinite;box-shadow:0 10px 30px rgba(108,92,231,.4)}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .title{font-size:26px;font-weight:800;background:linear-gradient(135deg,#6c5ce7,#a855f7,#00d2a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:gradientShift 3s infinite}
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .subtitle{color:var(--text2);font-size:12px}
    .subtitle span{color:var(--accent2);font-weight:600}
    .input-group{margin-bottom:20px}
    .input-group input{width:100%;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:all .3s}
    .input-group input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(108,92,231,.15)}
    .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(108,92,231,.4)}
    .login-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);animation:shine 3s infinite}
    @keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    .error{color:#ff4757;text-align:center;font-size:13px;margin-top:12px;display:none}
    .error.show{display:block;animation:shake .5s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="title">Nom AI</div>
      <div class="subtitle">Created by <span>Nomin Methdam</span></div>
    </div>
    <div class="input-group"><input type="text" id="username" placeholder="Username" autocomplete="off"></div>
    <div class="input-group"><input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter')login()"></div>
    <button class="login-btn" onclick="login()">⚡ Access Nom AI</button>
    <div class="error" id="error">❌ Invalid credentials</div>
    <div style="text-align:center;margin-top:16px;color:#505070;font-size:11px;">username: nomin / password: nomin</div>
  </div>
  <script>
    const bg=document.getElementById('bg');
    const colors=['#6c5ce7','#a855f7','#00d2a0','#ff6b6b','#ffd93d'];
    for(let i=0;i<40;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*3+2;p.style.cssText=`width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*5)]};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*6}s;animation-duration:${Math.random()*6+4}s;box-shadow:0 0 ${s*3}px ${colors[Math.floor(Math.random()*5)]};`;bg.appendChild(p)}
    for(let i=0;i<3;i++){const o=document.createElement('div');o.className='orb';o.style.cssText=`width:${Math.random()*200+100}px;height:${Math.random()*200+100}px;background:${colors[i]};left:${Math.random()*80}%;top:${Math.random()*80}%;animation-delay:${i*2}s;opacity:.08;`;bg.appendChild(o)}
    async function login(){const u=document.getElementById('username').value;const p=document.getElementById('password').value;try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const data=await res.json();if(data.success){document.querySelector('.login-box').style.transform='scale(0.95)';document.querySelector('.login-box').style.opacity='0';setTimeout(()=>window.location.href='/chat',400)}else{const e=document.getElementById('error');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}}catch(err){alert('Cannot connect to server')}}
  </script>
</body>
</html>
