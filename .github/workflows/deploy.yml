name: 🧠 Deploy Nom AI - Cloudflare + tmate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📚 Install Dependencies
      run: |
        npm init -y
        npm install express cors multer express-session axios cheerio
    
    - name: 🧠 Install Ollama & AI Models
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull llama3.2
        echo "✅ Ollama ready"
    
    - name: 🚀 Start Nom AI Server
      run: |
        mkdir -p uploads public
        node server.js &
        sleep 5
        curl -s http://localhost:3000/login && echo "✅ Server OK" || echo "❌ Server FAILED"
    
    - name: ☁️ Install Cloudflare Tunnel
      run: |
        sudo mkdir -p --mode=0755 /usr/share/keyrings
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
        echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
        sudo apt-get update && sudo apt-get install -y cloudflared
        echo "✅ Cloudflared installed"
    
    - name: 🌐 Start Cloudflare Tunnel
      run: |
        sudo cloudflared service install eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9
        nohup cloudflared tunnel run --token eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9 &
        sleep 5
        echo "✅ Tunnel started"
    
    - name: 🖥️ Install & Start tmate
      run: |
        sudo apt-get install -y tmate
        tmate -S /tmp/tmate.sock new-session -d
        tmate -S /tmp/tmate.sock wait tmate-ready
        echo ""
        echo "╔══════════════════════════════════════════╗"
        echo "║     🖥️  TMATE ACCESS                     ║"
        echo "╠══════════════════════════════════════════╣"
        tmate -S /tmp/tmate.sock display -p "║  Web: https://tmate.io/t/#{tmate_ssh}"
        tmate -S /tmp/tmate.sock display -p "║  SSH: ssh #{tmate_ssh}"
        echo "╚══════════════════════════════════════════╝"
    
    - name: 🔄 Keep Alive
      run: |
        echo "🧠 Nom AI Live!"
        echo "🌐 https://ai.nomv2ray.org"
        echo "👤 nomin / nomin"
        for i in $(seq 1 360); do
          sleep 60
          echo "[$(date '+%H:%M')] Uptime: ${i}min"
        done
