name: 🧠 Deploy Nom AI - Cloudflare + tmate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📚 Install Dependencies
      run: |
        npm init -y
        npm install express cors multer express-session axios cheerio
    
    - name: 🧠 Install Ollama & AI Models
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull llama3.2
        echo "✅ Ollama ready"
    
    - name: 🚀 Start Nom AI Server
      run: |
        mkdir -p uploads public
        
        # Start server
        nohup node server.js > server.log 2>&1 &
        sleep 5
        
        # Test server
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login)
        echo "Server HTTP Code: $HTTP_CODE"
        
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "304" ]; then
          echo "✅ Server is RUNNING on port 3000"
        else
          echo "⚠️ Server may not be ready yet..."
          cat server.log
        fi
    
    - name: ☁️ Install Cloudflare Tunnel
      run: |
        # Add cloudflare gpg key
        sudo mkdir -p --mode=0755 /usr/share/keyrings
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
        
        # Add repo to apt repositories
        echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
        
        # Update and install cloudflared
        sudo apt-get update && sudo apt-get install -y cloudflared
        
        echo "✅ Cloudflared installed"
        cloudflared --version
    
    - name: 🌐 Authenticate & Start Cloudflare Tunnel
      run: |
        # Authenticate cloudflared
        sudo cloudflared service install eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9
        
        # Start tunnel in background
        nohup cloudflared tunnel run --token eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9 > tunnel.log 2>&1 &
        
        sleep 8
        
        echo "✅ Cloudflare Tunnel started"
        echo ""
        echo "Tunnel log:"
        tail -5 tunnel.log
    
    - name: 🖥️ Install & Start tmate
      run: |
        # Install tmate
        sudo apt-get update
        sudo apt-get install -y tmate
        
        echo "✅ tmate installed"
        
        # Start tmate session
        tmate -F &
        sleep 5
        
        # Show tmate connection info
        echo ""
        echo "╔══════════════════════════════════════════════╗"
        echo "║         🖥️  TMATE REMOTE ACCESS              ║"
        echo "╠══════════════════════════════════════════════╣"
        tmate show-messages
        echo "╚══════════════════════════════════════════════╝"
        echo ""
    
    - name: 📋 Show All Connection Info
      run: |
        sleep 3
        echo ""
        echo "╔══════════════════════════════════════════════╗"
        echo "║     🧠 NOM AI - ALL CONNECTION INFO         ║"
        echo "╠══════════════════════════════════════════════╣"
        echo "║                                              ║"
        echo "║  🌐 WEBSITE:                                ║"
        echo "║  https://ai.nomv2ray.org                    ║"
        echo "║  👤 Username: nomin                         ║"
        echo "║  🔑 Password: nomin                         ║"
        echo "║                                              ║"
        echo "║  🖥️  TMATE SSH:                             ║"
        echo "║  $(tmate show-messages 2>/dev/null | grep 'ssh session:' | head -1 | sed 's/ssh session: //')"
        echo "║                                              ║"
        echo "║  👨‍💻 Creator: Nomin Methdam                  ║"
        echo "║                                              ║"
        echo "╚══════════════════════════════════════════════╝"
        echo ""
        echo "✅ ALL SERVICES RUNNING"
        echo ""
        echo "Server status:"
        curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:3000/login
        echo ""
    
    - name: 🔄 Keep Alive (360 minutes)
      run: |
        echo ""
        echo "══════════════════════════════════════════════"
        echo "  🧠 NOM AI IS LIVE!"
        echo "  🌐 https://ai.nomv2ray.org"
        echo "  👤 nomin / nomin"
        echo "  🖥️  tmate active for SSH access"
        echo "══════════════════════════════════════════════"
        echo ""
        
        # Keep alive with status checks
        for i in $(seq 1 360); do
          sleep 60
          S_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login 2>/dev/null || echo "down")
          echo "[$(date '+%H:%M:%S')] Server: $S_STATUS | Tunnel: Active | tmate: Active | Uptime: ${i}min"
        done
        
