name: 🧠 Deploy Nom AI - Cloudflare Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📚 Install Dependencies
      run: |
        npm init -y
        npm install express cors multer express-session axios cheerio
    
    - name: 🧠 Install Ollama & AI Models
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull llama3.2
        echo "✅ Ollama ready"
    
    - name: 🚀 Start Nom AI Server
      run: |
        mkdir -p uploads public
        nohup node server.js > server.log 2>&1 &
        sleep 5
        echo "✅ Server starting..."
        
        # Verify server is running
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login)
        echo "Server response: $HTTP_CODE"
        
        if [ "$HTTP_CODE" != "000" ]; then
          echo "✅ Server is running on port 3000"
        else
          echo "❌ Server failed to start!"
          cat server.log
        fi
    
    - name: ☁️ Install Cloudflare Tunnel
      run: |
        # Add cloudflare gpg key
        sudo mkdir -p --mode=0755 /usr/share/keyrings
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
        
        # Add repo to apt repositories
        echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
        
        # Update and install cloudflared
        sudo apt-get update && sudo apt-get install -y cloudflared
        
        echo "✅ Cloudflared installed"
        cloudflared --version
    
    - name: 🌐 Start Cloudflare Tunnel
      run: |
        # Authenticate and start tunnel
        sudo cloudflared service install eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9
        
        # Run tunnel
        nohup cloudflared tunnel run --token eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiOGY2YTQxZjYtMGVlMi00ZWNjLWI1OGMtMjc5NTQ4N2E1Yzc4IiwicyI6Ik5tTmlZamcyTjJFdFl6QTFZeTAwWlRsbExXRTVaVGt0TVRVNE5URTJNR0U0TnpjeCJ9 > tunnel.log 2>&1 &
        
        sleep 10
        
        echo ""
        echo "╔══════════════════════════════════════════════╗"
        echo "║     🧠 NOM AI - CLOUDFLARE TUNNEL           ║"
        echo "╠══════════════════════════════════════════════╣"
        echo "║  ✅ Server:  http://localhost:3000          ║"
        echo "║  ☁️  Tunnel: Cloudflare Active               ║"
        echo "║  🌐 Domain: ai.nomv2ray.org                 ║"
        echo "║  👤 Login:  nomin / nomin                   ║"
        echo "║  👨‍💻 Creator: Nomin Methdam                  ║"
        echo "╚══════════════════════════════════════════════╝"
        echo ""
        
        # Check tunnel status
        echo "Tunnel log:"
        tail -10 tunnel.log
        echo ""
    
    - name: 🔄 Keep Alive (360 minutes)
      run: |
        echo ""
        echo "══════════════════════════════════════════════"
        echo "  🧠 NOM AI IS LIVE!"
        echo "  🌐 https://ai.nomv2ray.org"
        echo "  👤 Username: nomin"
        echo "  🔑 Password: nomin"
        echo "  👨‍💻 Creator: Nomin Methdam"
        echo "══════════════════════════════════════════════"
        echo ""
        echo "Checking services every 60s..."
        
        for i in $(seq 1 360); do
          sleep 60
          SERVER_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login 2>/dev/null || echo "down")
          echo "[$(date '+%H:%M:%S')] Server: $SERVER_CHECK | Tunnel: Active | Uptime: ${i}min"
        done
