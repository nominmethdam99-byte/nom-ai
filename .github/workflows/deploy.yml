name: 🧠 Deploy Nom AI - Cloudflare Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📚 Install Dependencies
      run: |
        npm init -y
        npm install express cors multer express-session axios cheerio
    
    - name: 🧠 Install Ollama & AI Models
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull llama3.2
        echo "✅ Ollama ready"
    
    - name: 🚀 Start Nom AI Server
      run: |
        mkdir -p uploads public
        nohup node server.js > server.log 2>&1 &
        sleep 3
        echo "✅ Server started on port 3000"
        curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login
    
    - name: ☁️ Install Cloudflare Tunnel
      run: |
        # Add cloudflare gpg key
        sudo mkdir -p --mode=0755 /usr/share/keyrings
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
        
        # Add repo to apt repositories
        echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
        
        # Install cloudflared
        sudo apt-get update && sudo apt-get install -y cloudflared
        
        echo "✅ Cloudflared installed"
    
    - name: 🌐 Start Cloudflare Tunnel
      run: |
        # Start cloudflare tunnel with your token
        sudo cloudflared service install eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiM2E5NzQ4NDYtNWI2OS00ZmE5LTgxNzctZDg2MTVlOGU5YjhlIiwicyI6Ik1EWTBOalZpTXpVdE1UazFOeTAwWWprMkxXRmtaakl0TWpVek4yWmtaV1V5TVRreSJ9
        
        # Run tunnel pointing to local server
        nohup cloudflared tunnel run --token eyJhIjoiMTFmODIyMGNmODllNGRjOWMwY2U3N2Q5YjlhMTU3N2MiLCJ0IjoiM2E5NzQ4NDYtNWI2OS00ZmE5LTgxNzctZDg2MTVlOGU5YjhlIiwicyI6Ik1EWTBOalZpTXpVdE1UazFOeTAwWWprMkxXRmtaakl0TWpVek4yWmtaV1V5TVRreSJ9 > tunnel.log 2>&1 &
        
        sleep 5
        
        echo ""
        echo "╔══════════════════════════════════════════╗"
        echo "║   🧠 NOM AI - CLOUDFLARE TUNNEL         ║"
        echo "╠══════════════════════════════════════════╣"
        echo "║  🌐 URL: YOUR-CLOUDFLARE-DOMAIN         ║"
        echo "║  👤 Username: nomin                     ║"
        echo "║  🔑 Password: nomin                     ║"
        echo "║  👨‍💻 Creator: Nomin Methdam              ║"
        echo "║  ☁️ Tunnel: Cloudflare Active            ║"
        echo "╚══════════════════════════════════════════╝"
        echo ""
        echo "✅ Nom AI is live via Cloudflare Tunnel!"
        echo "📋 Check Cloudflare Dashboard for your URL:"
        echo "   https://one.dash.cloudflare.com/"
        echo ""
    
    - name: 🔄 Keep Alive (360 minutes)
      run: |
        echo "Nom AI running on Cloudflare Tunnel..."
        echo "Login: nomin / nomin"
        echo "Creator: Nomin Methdam"
        sleep 21600
